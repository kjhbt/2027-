<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>📅 2027 대입 면접 일정</title>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }

#topBar {
  background:white;
  padding:15px 20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

#controls { display:flex; gap:10px; flex-wrap:wrap; }

#main { display:flex; gap:20px; padding:20px; }

#calendar {
  flex:1;
  background:white;
  padding:15px;
  border-radius:10px;
}

#sidePanel {
  width:320px;
  background:white;
  padding:15px;
  border-radius:10px;
  height:85vh;
  overflow-y:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.fc .fc-button {
  background:#e8eaed;
  border:none;
  border-radius:20px;
}
.fc .fc-today-button {
  background:#1a73e8 !important;
  color:white !important;
}

.type-btn { opacity:0.6; }
.type-btn.active { opacity:1; font-weight:bold; }

.green { background:#34a853; color:white; }
.blue { background:#4285f4; color:white; }
.red { background:#ea4335; color:white; }

.today-highlight { background:#fff3cd !important; }
</style>
</head>

<body>

<div id="topBar">
  <h2>📅 2027 대입 면접 일정</h2>

  <div id="controls">
    <select id="classFilter"><option value="all">전체 반</option></select>
    <input id="nameFilter" placeholder="이름 검색">
    <input type="file" id="fileInput">
    <button onclick="downloadExcel()">엑셀 다운로드</button>
    <button onclick="deleteAllEvents()" style="background:#ea4335;color:white;">전체 삭제</button>
    <button onclick="deleteLastUpload()" style="background:#fbbc05;">최근 업로드 삭제</button>
  </div>
</div>

<div id="main">
  <div id="calendar"></div>

  <div id="sidePanel">
    <h3 id="selectedDateTitle">날짜 선택</h3>
    <div id="dayList">날짜를 클릭하세요</div>

    <hr>

    <input id="m_name" placeholder="이름"><br>
    <input id="m_university" placeholder="대학명"><br>
    <input id="m_major" placeholder="모집단위"><br>
    <input id="m_class" placeholder="반"><br>
    <input id="m_number" placeholder="번호"><br>

    <p>유형 선택</p>
    <button class="type-btn green" onclick="selectType('면접', this)">면접</button>
    <button class="type-btn blue" onclick="selectType('실기', this)">실기</button>
    <button class="type-btn red" onclick="selectType('논술', this)">논술</button>

    <br><br>
    <button onclick="addEvent()">추가</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "hexagon-8d950.firebaseapp.com",
  projectId: "hexagon-8d950"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let calendar;
let allData = [];
let selectedDate = null;
let selectedType = null;

// ✅ 중복 체크
function isDuplicate(data){
  return allData.some(e =>
    e.name === data.name &&
    e.date === data.date &&
    e.type === data.type
  );
}

// 날짜 파싱
function parseDate(d){
  if(!d) return null;
  if(typeof d==='number'){
    const date=new Date((d-25569)*86400*1000);
    return date.toISOString().split('T')[0];
  }
  if(typeof d==='string' && d.includes('~')){
    return d.split('~')[0].trim();
  }
  return d.trim();
}

// 유형 선택
function selectType(type, el){
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(btn=>btn.classList.remove('active'));
  el.classList.add('active');
}

// 캘린더
function initCalendar(){
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView:'dayGridMonth',
    locale:'ko',
    editable:true,

    headerToolbar:{
      left:'',
      center:'prev title next',
      right:'today'
    },

    dateClick(info){
      selectedDate = info.dateStr;
      selectedDateTitle.innerText = info.dateStr + " 일정";
      renderDayList();
    },

    eventClick(info){
      if(confirm("삭제하시겠습니까?")){
        db.collection('events').doc(info.event.id).delete();
      }
    }
  });

  calendar.render();
}

// 일정 추가 (중복 방지)
function addEvent(){
  if(!selectedDate || !selectedType) return;

  const newData = {
    name:m_name.value,
    university:m_university.value,
    major:m_major.value,
    class:m_class.value,
    number:m_number.value,
    type:selectedType,
    date:selectedDate
  };

  if(isDuplicate(newData)){
    alert("이미 존재하는 일정");
    return;
  }

  db.collection('events').add(newData);
}

// 목록
function renderDayList(){
  const list = allData.filter(e=>e.date===selectedDate);
  dayList.innerHTML = list.length
    ? list.map(e=>`${e.name} (${e.type})`).join('<br>')
    : "일정 없음";
}

// 필터
function renderEvents(){
  calendar.removeAllEvents();
  calendar.addEventSource(allData.map(e=>({
    id:e.id,
    title:e.name,
    start:e.date
  })));
}

// 실시간
db.collection('events').onSnapshot(snap=>{
  allData = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderEvents();
  renderDayList();
});

// ✅ 전체 삭제
async function deleteAllEvents(){
  if(!confirm("전체 삭제?")) return;
  const snap = await db.collection('events').get();
  const batch = db.batch();
  snap.docs.forEach(doc=>batch.delete(doc.ref));
  await batch.commit();
}

// ✅ 업로드 삭제
async function deleteLastUpload(){
  const ids = allData.map(e=>e.uploadId).filter(Boolean);
  if(ids.length===0){ alert("업로드 없음"); return; }

  const latest = Math.max(...ids);
  const snap = await db.collection('events').where('uploadId','==',latest).get();

  const batch = db.batch();
  snap.docs.forEach(doc=>batch.delete(doc.ref));
  await batch.commit();
}

// 엑셀 업로드
fileInput.addEventListener('change', e=>{
  const reader=new FileReader();

  reader.onload=evt=>{
    const wb=XLSX.read(evt.target.result,{type:'array'});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(sheet);

    const uploadId = Date.now();

    json.forEach(row=>{
      const base={
        class:row['반'],
        number:row['번호'],
        name:row['이름']
      };

      ['면접','실기','논술'].forEach(type=>{
        const date=parseDate(row[type+'일자']);
        if(date){
          const newData={...base,type,date};
          if(!isDuplicate(newData)){
            db.collection('events').add({...newData,uploadId});
          }
        }
      });
    });

    alert("업로드 완료");
  };

  reader.readAsArrayBuffer(e.target.files[0]);
});

initCalendar();
</script>

</body>
</html>
